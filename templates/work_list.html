<!DOCTYPE html>
<html>
<head>
    <title>Available Works - S.F Works Hub</title>

    <style>
        body{
            font-family: Arial;
            margin:0;
            padding:20px;
            background:linear-gradient(135deg,#eef2f7,#dfe9f3);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        .container{
            max-width:850px;
            margin:auto;
        }

        /* CARD */
        .card{
            background:white;
            padding:18px;
            margin:12px 0;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.01);
        }

        /* TITLE */
        .title{
            font-size:18px;
            font-weight:bold;
            color:#333;
        }

        /* BADGES */
        .badge{
            display:inline-block;
            padding:4px 10px;
            font-size:12px;
            border-radius:20px;
            margin-left:5px;
            color:white;
        }

        .salary{
            background:#28a745;
        }

        .workers{
            background:#007bff;
        }

        /* INFO */
        .info{
            color:#555;
            margin:6px 0;
            font-size:14px;
        }

        .meta{
            font-size:12px;
            color:gray;
        }

        /* BUTTON */
        .btn{
            display:inline-block;
            padding:10px 14px;
            background:linear-gradient(90deg,#28a745,#1e7e34);
            color:white;
            border-radius:8px;
            text-decoration:none;
            margin-top:10px;
            font-size:14px;
        }

        .btn:hover{
            transform:scale(1.05);
        }

        /* TOP BAR */
        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .search{
            width:100%;
            max-width:300px;
            padding:10px;
            border-radius:8px;
            border:1px solid #ddd;
        }

        @media(max-width:600px){
            .topbar{
                flex-direction:column;
                gap:10px;
            }
        }
    </style>
</head>

<body>

<h2>💼 Available Works</h2>

<div class="container">

    <!-- SEARCH UI (future ready) -->
    <div class="topbar">
        <input class="search" placeholder="🔍 Search work...">
    </div>

    {% for w in works %}

    <div class="card">

        <div class="title">
            {{ w.title }}
        </div>

        <div class="info">
            <span class="badge workers">👷 {{ w.workers_needed }} Workers</span>
            <span class="badge salary">💰 {{ w.salary }}</span>
        </div>

        <div class="meta">📅 {{ w.date }} | ⏰ {{ w.time }}</div>

        <div class="info">📞 Contact: {{ w.phone }}</div>

        <a href="/apply_work/{{ w.id }}" class="btn">🚀 Apply Now</a>

    </div>

    {% endfor %}

</div>

</body>
</html>
