<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>S.F Works Hub - Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#0f172a;
    color:white;
}

/* ================= TOPBAR ================= */

.topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:72px;
    background:rgba(15,23,42,0.92);
    backdrop-filter:blur(15px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 18px;
    z-index:9999;
    gap:12px;
}

/* LEFT */

.menu-btn{
    width:46px;
    height:46px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    font-size:22px;
    cursor:pointer;
}

.logo-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo-circle{
    width:42px;
    height:42px;
    border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#60a5fa);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
}

/* ================= SEARCH ================= */

.search-wrapper{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
}

.search-wrapper input{
    width:100%;
    max-width:420px;
    height:45px;
    border:none;
    outline:none;
    border-radius:14px;
    padding:0 15px;
    background:#1e293b;
    color:white;
}

/* search icon */
.search-icon{
    width:45px;
    height:45px;
    border-radius:12px;
    background:#1e293b;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

/* ================= PROFILE ================= */

.profile-mini{
    display:flex;
    align-items:center;
    gap:10px;
    background:#1e293b;
    padding:6px 10px;
    border-radius:12px;
    cursor:pointer;
}

.profile-mini img{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #3b82f6;
}

/* ================= GRID ================= */

.main{
    padding:100px 20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

/* CARD */

.card{
    background:#111827;
    border-radius:20px;
    overflow:hidden;
    position:relative;
}

/* AVATAR */

.user-avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    border:4px solid #111827;
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:-45px;
    background:white;
}

/* STATUS BADGE */

.status{
    position:absolute;
    top:10px;
    right:10px;
    padding:5px 10px;
    border-radius:20px;
    font-size:11px;
    font-weight:600;
}

.online{
    background:#22c55e;
}

.offline{
    background:#64748b;
}

/* CARD BODY */

.card-body{
    padding:60px 15px 20px;
    text-align:center;
}

/* BUTTONS */

.btn-group{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.btn{
    flex:1;
    padding:10px;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
    font-size:13px;
}

.view-btn{
    background:#2563eb;
    color:white;
}

.msg-btn{
    background:#1e293b;
    color:white;
}

</style>

</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

    <button class="menu-btn">☰</button>

    <div class="logo-box">
        <div class="logo-circle">SF</div>
        <b>S.F Hub</b>
    </div>

    <!-- SEARCH FIXED -->
    <div class="search-wrapper">

        <input id="searchInput" type="text" placeholder="Search by area, skill or name...">

        <div class="search-icon" onclick="filterUsers()">🔍</div>

    </div>

    <!-- PROFILE -->
    <div class="profile-mini">
        <img src="/static/default.png">
        <div>
            <div style="font-size:13px;font-weight:600;">User</div>
            <div style="font-size:11px;color:#22c55e;">● Online</div>
        </div>
    </div>

</div>

<!-- MAIN -->
<div class="main">

    <div class="grid" id="userGrid">

        {% for profile in profiles %}

        <div class="card user-card">

            <!-- STATUS (demo: random online/offline) -->
            <div class="status {{ 'online' if loop.index % 2 == 0 else 'offline' }}">
                {{ 'Online' if loop.index % 2 == 0 else 'Offline' }}
            </div>

            <div style="height:120px;background:#1e293b;position:relative;">

                <img class="user-avatar"
                     src="{{ profile.profile_img if profile.profile_img else url_for('static', filename='default.png') }}">

            </div>

            <div class="card-body">

                <h3 class="name">{{ profile.name }}</h3>
                <p class="area">{{ profile.area }}</p>
                <p class="skill">{{ profile.education }}</p>

                <div class="btn-group">

                    <a class="btn view-btn" href="/profile/{{ profile.user_id }}">
                        View Profile
                    </a>

                    <a class="btn msg-btn" href="/chat/{{ profile.user_id }}">
                        Message
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

<script>

/* ================= SEARCH FILTER ================= */

function filterUsers(){

    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".user-card");

    cards.forEach(card => {

        let name = card.querySelector(".name").innerText.toLowerCase();
        let area = card.querySelector(".area").innerText.toLowerCase();
        let skill = card.querySelector(".skill").innerText.toLowerCase();

        if(name.includes(input) || area.includes(input) || skill.includes(input)){
            card.style.display = "block";
        }else{
            card.style.display = "none";
        }

    });

}

document.getElementById("searchInput").addEventListener("keyup", filterUsers);

</script>

</body>
</html>
