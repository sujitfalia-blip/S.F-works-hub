<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>User Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

/* TOPBAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    position:sticky;
    top:0;
    z-index:10;
}

.badge{
    background:rgba(255,255,255,0.15);
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    padding:15px;
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.1);
}

/* BUTTON */
.btn{
    display:inline-block;
    padding:8px 12px;
    margin-top:10px;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    text-decoration:none;
    font-size:13px;
}

/* SECTIONS */
.section-title{
    margin:20px 0 10px;
    font-size:18px;
}

/* SEARCH */
input{
    padding:10px;
    width:100%;
    border-radius:10px;
    border:none;
    outline:none;
    margin-bottom:10px;
}

/* ACTION GRID */
.action-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

.action{
    padding:12px;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    cursor:pointer;
    text-align:center;
}

.action:hover{
    background:rgba(255,255,255,0.15);
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div>👤 User Dashboard</div>

    <div>
        <span class="badge">User</span>
        <span class="badge">🟢 Online</span>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <h2>Welcome Back 👋</h2>

    <!-- SEARCH -->
    <input id="search" placeholder="🔍 Search works, skills, jobs...">

    <!-- ACTIONS -->
    <div class="section-title">⚡ Quick Actions</div>

    <div class="action-grid">

        <div class="action" onclick="loadProfile()">👤 Profile</div>
        <div class="action" onclick="loadHire()">🧑‍💼 Hire Worker</div>
        <div class="action" onclick="loadChat()">💬 Chat</div>
        <div class="action" onclick="loadBooking()">📅 Booking</div>
        <div class="action" onclick="loadNotifications()">🔔 Notifications</div>

    </div>

    <!-- SKILLS -->
    <div class="section-title">🧠 Skills</div>

    <div class="card">
        <p>✔ Web Development</p>
        <p>✔ App Development</p>
        <p>✔ Marketing</p>
        <p>✔ Data Entry</p>
    </div>

    <!-- LIVE WORKS -->
    <div class="section-title">🆕 Live Works</div>

    <div class="grid" id="grid"></div>

</div>

<script>

let socket = io({
    transports:["websocket","polling"]
});

// ================= LIVE WORK =================
socket.on("new_work", function(data){

    let grid = document.getElementById("grid");

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <b>🆕 ${data.title}</b>
        <p>💰 ${data.salary}</p>
        <a class="btn" href="/work/${data.id}">View</a>
    `;

    grid.prepend(div);
});


// ================= PROFILE =================
function loadProfile(){
    document.getElementById("grid").innerHTML = `
        <div class="card">
            <h3>👤 Profile</h3>
            <p>Name: User</p>
            <p>Email: user@mail.com</p>
            <button class="btn">Edit Profile</button>
        </div>
    `;
}


// ================= HIRE =================
function loadHire(){
    document.getElementById("grid").innerHTML = `
        <div class="card">
            <h3>🧑‍💼 Hire Worker</h3>
            <input placeholder="Skill required">
            <input placeholder="Budget">
            <button class="btn">Post Job</button>
        </div>
    `;
}


// ================= CHAT =================
function loadChat(){
    document.getElementById("grid").innerHTML = `
        <div class="card">
            <h3>💬 Chat</h3>
            <p>Live chat system coming...</p>
        </div>
    `;
}


// ================= BOOKING =================
function loadBooking(){
    document.getElementById("grid").innerHTML = `
        <div class="card">
            <h3>📅 Booking</h3>
            <p>No bookings yet</p>
        </div>
    `;
}


// ================= NOTIFICATION =================
function loadNotifications(){
    document.getElementById("grid").innerHTML = `
        <div class="card">
            <h3>🔔 Notifications</h3>
            <p>No new notifications</p>
        </div>
    `;
}


// ================= SEARCH =================
document.getElementById("search").addEventListener("keyup", function(){

    let val = this.value.toLowerCase();

    document.querySelectorAll(".card").forEach(card => {
        card.style.display =
            card.innerText.toLowerCase().includes(val)
            ? ""
            : "none";
    });

});

</script>

</body>
</html>
