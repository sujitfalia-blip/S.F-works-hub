<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>User Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:white;
}

/* TOPBAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(15px);
    position:sticky;
    top:0;
    z-index:10;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.badge{
    background:rgba(255,255,255,0.12);
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
    margin-left:5px;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

/* SEARCH */
input{
    padding:12px;
    width:100%;
    border-radius:10px;
    border:none;
    outline:none;
    margin:15px 0;
    background:rgba(255,255,255,0.08);
    color:white;
}

/* TITLE */
.section-title{
    margin:20px 0 10px;
    font-size:16px;
    opacity:0.9;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:15px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(12px);
    padding:15px;
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.08);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,0.1);
}

/* BUTTON */
.btn{
    display:inline-block;
    padding:8px 12px;
    margin-top:10px;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    text-decoration:none;
    font-size:13px;
    border:none;
    cursor:pointer;
}

/* ACTION GRID */
.action-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:10px;
}

.action{
    padding:14px;
    border-radius:12px;
    background:rgba(255,255,255,0.06);
    cursor:pointer;
    text-align:center;
    border:1px solid rgba(255,255,255,0.08);
    transition:0.2s;
}

.action:hover{
    background:rgba(255,255,255,0.12);
    transform:scale(1.03);
}

/* PROFILE HEADER */
.profile-box{
    display:flex;
    align-items:center;
    gap:15px;
}

.avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    background:#3b82f6;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div>👤 User Dashboard</div>
    <div>
        <span class="badge">User</span>
        <span class="badge">🟢 Online</span>
    </div>
</div>

<div class="container">

    <h2>Welcome Back 👋</h2>

    <!-- SEARCH -->
    <input id="search" placeholder="🔍 Search jobs, profile, referral...">

    <!-- ACTIONS -->
    <div class="section-title">⚡ Quick Actions</div>

    <div class="action-grid">

        <div class="action" onclick="loadProfile()">👤 Profile</div>
        <div class="action" onclick="loadReferral()">🔗 Referral</div>
        <div class="action" onclick="loadHire()">🧑‍💼 Hire</div>
        <div class="action" onclick="loadChat()">💬 Chat</div>
        <div class="action" onclick="loadBooking()">📅 Booking</div>
        <div class="action" onclick="loadNotifications()">🔔 Alerts</div>

    </div>

    <!-- LIVE WORKS -->
    <div class="section-title">🆕 Live Works</div>
    <div class="grid" id="grid"></div>

</div>

<script>

let socket = io({
    transports:["websocket","polling"]
});

// LIVE WORK
socket.on("new_work", function(data){

    let grid = document.getElementById("grid");

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <b>🆕 ${data.title}</b>
        <p>💰 ${data.salary}</p>
        <a class="btn" href="/work/${data.id}">View</a>
    `;

    grid.prepend(div);
});


// PROFILE
function loadProfile(){
    document.getElementById("grid").innerHTML = `
        <div class="card">
            <div class="profile-box">
                <div class="avatar">U</div>
                <div>
                    <h3>User Profile</h3>
                    <p>Email: user@mail.com</p>
                </div>
            </div>
            <button class="btn">Edit Profile</button>
        </div>
    `;
}


// REFERRAL
function loadReferral(){
    document.getElementById("grid").innerHTML = `
        <div class="card">
            <h3>🔗 Referral Program</h3>
            <p>Invite friends and earn rewards.</p>
            <input value="https://yourapp.com/ref?code=USER123" readonly>
            <button class="btn">Copy Link</button>
        </div>
    `;
}


// HIRE
function loadHire(){
    document.getElementById("grid").innerHTML = `
        <div class="card">
            <h3>🧑‍💼 Hire Worker</h3>
            <input placeholder="Skill required">
            <input placeholder="Budget">
            <button class="btn">Post Job</button>
        </div>
    `;
}


// CHAT
function loadChat(){
    document.getElementById("grid").innerHTML = `
        <div class="card">
            <h3>💬 Chat</h3>
            <p>Live chat coming soon...</p>
        </div>
    `;
}


// BOOKING
function loadBooking(){
    document.getElementById("grid").innerHTML = `
        <div class="card">
            <h3>📅 Booking</h3>
            <p>No bookings yet</p>
        </div>
    `;
}


// NOTIFICATION
function loadNotifications(){
    document.getElementById("grid").innerHTML = `
        <div class="card">
            <h3>🔔 Notifications</h3>
            <p>No new notifications</p>
        </div>
    `;
}


// SEARCH FILTER
document.getElementById("search").addEventListener("keyup", function(){

    let val = this.value.toLowerCase();

    document.querySelectorAll(".card").forEach(card => {
        card.style.display =
            card.innerText.toLowerCase().includes(val)
            ? ""
            : "none";
    });

});

</script>

</body>
</html>
