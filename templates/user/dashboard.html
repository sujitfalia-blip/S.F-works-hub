<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>S.F Works Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#0f172a;
    color:white;
}

/* ================= TOPBAR ================= */

.topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:70px;
    background:rgba(15,23,42,0.95);
    backdrop-filter:blur(12px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    z-index:1000;
}

/* LEFT */

.left{
    display:flex;
    align-items:center;
    gap:10px;
}

.menu-btn{
    width:42px;
    height:42px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    font-size:22px;
    cursor:pointer;
}

.logo{
    display:flex;
    align-items:center;
    gap:8px;
}

.logo-box{
    width:38px;
    height:38px;
    border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#60a5fa);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
}

/* ================= PROFILE FIXED ================= */

.right{
    display:flex;
    align-items:center;
    gap:10px;
}

.profile{
    display:flex;
    align-items:center;
    gap:8px;
    background:#1e293b;
    padding:6px 10px;
    border-radius:12px;
    cursor:pointer;
    position:relative;
}

/* FIXED IMAGE SIZE */
.profile img{
    width:34px;
    height:34px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #3b82f6;
}

/* ONLINE DOT */
.online-dot{
    width:9px;
    height:9px;
    background:#22c55e;
    border-radius:50%;
    position:absolute;
    top:6px;
    left:6px;
}

/* ================= SEARCH ================= */

.search-bar{
    margin-top:70px;
    padding:12px;
    display:flex;
    gap:8px;
    justify-content:center;
}

.search-bar input{
    width:70%;
    max-width:500px;
    height:42px;
    border:none;
    outline:none;
    border-radius:10px;
    padding:0 12px;
    background:#1e293b;
    color:white;
}

.search-btn{
    width:42px;
    height:42px;
    border-radius:10px;
    border:none;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

/* ================= GRID ================= */

.main{
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:15px;
}

/* ================= CARD (PRO LEVEL) ================= */

.card{
    background:#111827;
    border-radius:18px;
    overflow:hidden;
    position:relative;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* STATUS BADGE */
.status{
    position:absolute;
    top:10px;
    right:10px;
    padding:5px 10px;
    border-radius:20px;
    font-size:11px;
    font-weight:600;
}

.online{background:#22c55e;}
.offline{background:#64748b;}

/* AVATAR */
.avatar{
    width:82px;
    height:82px;
    border-radius:50%;
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:-40px;
    border:4px solid #111827;
    background:white;
}

/* BODY */
.body{
    padding:55px 15px 18px;
    text-align:center;
}

.body h3{
    font-size:16px;
    font-weight:700;
}

.body p{
    font-size:13px;
    color:#94a3b8;
    margin-top:3px;
}

/* BUTTONS */
.btns{
    display:flex;
    gap:8px;
    margin-top:12px;
}

.btn{
    flex:1;
    padding:8px;
    border-radius:8px;
    text-decoration:none;
    font-size:12px;
    font-weight:600;
}

.view{
    background:#2563eb;
    color:white;
}

.msg{
    background:#1e293b;
    color:white;
}

/* MOBILE */
@media(max-width:700px){
    .search-bar input{
        width:90%;
    }
}

</style>

</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

    <div class="left">

        <button class="menu-btn">☰</button>

        <div class="logo">
            <div class="logo-box">SF</div>
            <b>S.F Hub</b>
        </div>

    </div>

    <div class="right">

        <!-- PROFILE FIXED -->
        <div class="profile" onclick="window.location.href='/profile'">

            <span class="online-dot"></span>

            <img src="{{ current_user.profile.profile_img if current_user.profile and current_user.profile.profile_img else '/static/default.png' }}">

            <small style="font-weight:600;">
                {{ current_user.profile.name if current_user.profile and current_user.profile.name else 'User' }}
            </small>

        </div>

    </div>

</div>

<!-- SEARCH -->
<div class="search-bar">

    <input id="searchInput" type="text" placeholder="Search by name, area or skill...">

    <button class="search-btn" onclick="filterUsers()">🔍</button>

</div>

<!-- MAIN -->
<div class="main">

    <div class="grid">

        {% for profile in profiles %}

        <div class="card user">

            <div class="status {{ 'online' if loop.index % 2 == 0 else 'offline' }}">
                {{ 'Online' if loop.index % 2 == 0 else 'Offline' }}
            </div>

            <div style="height:110px;background:#1e293b;position:relative;">

                <img class="avatar"
                     src="{{ profile.profile_img if profile.profile_img else '/static/default.png' }}">

            </div>

            <div class="body">

                <h3>{{ profile.name }}</h3>
                <p>{{ profile.area }}</p>
                <p>{{ profile.education }}</p>

                <div class="btns">

                    <a class="btn view" href="/profile/{{ profile.user_id }}">
                        View
                    </a>

                    <a class="btn msg" href="/chat/{{ profile.user_id }}">
                        Msg
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

<script>

/* SEARCH */
function filterUsers(){

    let input = document.getElementById("searchInput").value.toLowerCase();
    let users = document.querySelectorAll(".user");

    users.forEach(u => {

        let name = u.querySelector("h3").innerText.toLowerCase();
        let area = u.querySelectorAll("p")[0].innerText.toLowerCase();
        let skill = u.querySelectorAll("p")[1].innerText.toLowerCase();

        if(name.includes(input) || area.includes(input) || skill.includes(input)){
            u.style.display = "block";
        }else{
            u.style.display = "none";
        }

    });

}

</script>

</body>
                </html>
