<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>S.F Works Hub - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.container{
    background:#fff;
    width:100%;
    max-width:380px;
    padding:35px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    text-align:center;
    animation:fadeIn .5s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#1e3c72;
    margin-bottom:8px;
}

.subtitle{
    font-size:14px;
    color:#777;
    margin-bottom:25px;
}

form{
    width:100%;
}

input{
    width:100%;
    padding:13px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
    background:#fafafa;
    font-size:14px;
    transition:.3s;
}

input:focus{
    outline:none;
    border-color:#2a5298;
    background:#fff;
    box-shadow:0 0 0 3px rgba(42,82,152,0.1);
}

button{
    width:100%;
    padding:14px;
    background:#2a5298;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:12px;
    transition:.3s;
}

button:hover{
    background:#1e3c72;
    transform:translateY(-1px);
}

.footer{
    margin-top:18px;
    font-size:13px;
    color:#666;
}

.footer a{
    color:#2a5298;
    text-decoration:none;
    font-weight:600;
}

.footer a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">🔥 S.F Works Hub</div>

    <div class="subtitle">
        Login to your account
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">

        <input
            type="text"
            name="phone"
            placeholder="📱 Phone Number"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="🔒 Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <div class="footer">
        Don't have an account?
        <a href="{{ url_for('auth.signup') }}">
            Sign Up
        </a>
    </div>

</div>

</body>
</html>
