<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>S.F Works Hub - Users</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

:root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --text: #111;
    --primary: #3b82f6;
    --shadow: 0 4px 12px rgba(0,0,0,0.08);
}

body.dark {
    --bg: #0b1220;
    --card: #111827;
    --text: #fff;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px;
}

.search-box input {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    width: 240px;
    outline: none;
}

/* TABLE CARD */
.card {
    margin: 20px;
    background: var(--card);
    padding: 15px;
    border-radius: 14px;
    box-shadow: var(--shadow);
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}

th {
    text-align: left;
    opacity: 0.7;
    font-size: 13px;
}

/* BUTTON */
.btn {
    padding: 6px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.primary {
    background: var(--primary);
    color: white;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 9999;
}

/* MODAL BOX */
.user-modal {
    width: 520px;
    max-width: 95%;
    margin: 6% auto;
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    animation: pop 0.2s ease-in-out;
}

@keyframes pop {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* HEADER */
.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--primary);
    color: white;
    padding: 12px 15px;
}

.close-btn {
    background: transparent;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* PROFILE GRID */
.profile-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 15px;
}

.profile-box {
    background: var(--bg);
    padding: 12px;
    border-radius: 10px;
    box-shadow: var(--shadow);
}

.profile-box h4 {
    margin: 0;
    font-size: 12px;
    opacity: 0.7;
}

.profile-box p {
    margin: 5px 0 0;
    font-weight: bold;
}

.full {
    grid-column: span 2;
}

/* RESPONSIVE */
@media(max-width:768px){
    .profile-grid {
        grid-template-columns: 1fr;
    }

    .search-box input {
        width: 140px;
    }
}

</style>
</head>

<body>

<div class="header">
    <h2>👥 Users Management</h2>
    <div class="search-box">
        <input type="text" placeholder="Search users..." oninput="searchUsers(this.value)">
    </div>
</div>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="usersTable"></tbody>
    </table>
</div>

<!-- MODAL -->
<div id="modal" class="modal">

    <div class="user-modal">

        <div class="modal-header">
            <h3>👤 User Details</h3>
            <button class="close-btn" onclick="closeModal()">✖</button>
        </div>

        <div id="profileData" class="profile-grid">Loading...</div>

    </div>
</div>

<script>

/* LOAD USERS */
async function loadUsers() {
    try {
        const res = await fetch("/admin/api/users");
        const data = await res.json();

        const users = data?.data?.users || [];
        const tbody = document.getElementById("usersTable");

        tbody.innerHTML = "";

        users.forEach(u => {
            tbody.innerHTML += `
            <tr>
                <td>${u.id}</td>
                <td>${u.name}</td>
                <td>${u.status}</td>
                <td>
                    <button class="btn primary" onclick="viewUser(${u.id})">
                        View
                    </button>
                </td>
            </tr>`;
        });

    } catch (err) {
        console.error(err);
    }
}

/* 🔥 FINAL VIEW USER (PRODUCTION SAFE) */
async function viewUser(id){

    document.getElementById("modal").style.display = "block";
    document.getElementById("profileData").innerHTML = "Loading...";

    try {
        const res = await fetch(`/admin/user/${id}`);

        if(!res.ok) throw new Error("API failed");

        const data = await res.json();
        const u = data.user || {};

        document.getElementById("profileData").innerHTML = `

        <div class="profile-box full" style="text-align:center;">
            <img src="${u.profile_img || '/static/default.png'}"
                 style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #3b82f6;">
            <h3 style="margin:10px 0 0;">${u.name || '-'}</h3>
        </div>

        <div class="profile-box">
            <h4>ID</h4>
            <p>${u.id || '-'}</p>
        </div>

        <div class="profile-box">
            <h4>Email</h4>
            <p>${u.email || 'N/A'}</p>
        </div>

        <div class="profile-box">
            <h4>Phone</h4>
            <p>${u.phone || 'N/A'}</p>
        </div>

        <div class="profile-box">
            <h4>Status</h4>
            <p>${u.status || '-'}</p>
        </div>

        <div class="profile-box">
            <h4>Role</h4>
            <p>${u.role || 'user'}</p>
        </div>

        <div class="profile-box full">
            <h4>Address</h4>
            <p>${u.address || 'N/A'}</p>
        </div>

        <div class="profile-box full">
            <h4>Created At</h4>
            <p>${u.created_at || 'N/A'}</p>
        </div>

        <div class="profile-box full">
            <h4>Last Seen</h4>
            <p>${u.last_seen || 'N/A'}</p>
        </div>

        `;

    } catch(err){
        console.error(err);
        document.getElementById("profileData").innerHTML =
            "<p style='color:red;'>Failed to load user</p>";
    }
}

/* CLOSE MODAL */
function closeModal(){
    document.getElementById("modal").style.display = "none";
}

/* SEARCH */
function searchUsers(value){
    document.querySelectorAll("#usersTable tr").forEach(r=>{
        r.style.display = r.innerText.toLowerCase().includes(value.toLowerCase()) ? "" : "none";
    });
}

/* INIT */
document.addEventListener("DOMContentLoaded", loadUsers);

</script>

</body>
</html>
