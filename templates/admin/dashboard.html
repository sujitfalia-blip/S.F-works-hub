<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ================= THEME ================= */
:root {
    --bg: #f4f6f9;
    --card: white;
    --text: #111;
    --sidebar: #0f172a;
}

body.dark {
    --bg: #0b1220;
    --card: #111827;
    --text: #fff;
}

/* ================= GLOBAL ================= */
body {
    margin: 0;
    font-family: Arial;
    background: var(--bg);
    color: var(--text);
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 240px;
    height: 100vh;
    background: var(--sidebar);
    color: white;
    position: fixed;
    padding: 20px;
}

.sidebar h2 {
    color: #22c55e;
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    padding: 10px 0;
    text-decoration: none;
}

.sidebar a:hover { color: white; }

/* ================= MAIN ================= */
.main {
    margin-left: 260px;
    padding: 20px;
}

/* ================= TOPBAR ================= */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    padding: 15px;
    border-radius: 10px;
}

/* ================= SEARCH ================= */
.search-box input {
    width: 280px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* ================= CARDS ================= */
.cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: var(--card);
    padding: 18px;
    border-radius: 12px;
}

/* ================= TABLE ================= */
.table-box {
    margin-top: 25px;
    background: var(--card);
    padding: 15px;
    border-radius: 12px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}

/* ================= BUTTONS ================= */
.btn {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.primary { background: #3b82f6; color: white; }
.success { background: #22c55e; color: white; }
.danger { background: #ef4444; color: white; }

/* ================= MODAL ================= */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

.modal-content {
    background: white;
    width: 400px;
    margin: 10% auto;
    padding: 20px;
    border-radius: 10px;
}

/* ================= PAGINATION ================= */
#paginationBox {
    margin-top: 15px;
    text-align: center;
}

#paginationBox button {
    margin: 2px;
}

/* ================= RESPONSIVE ================= */
@media(max-width: 900px){
    .cards { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
    <h2>ADMIN PANEL</h2>

    <a href="/admin/">📊 Dashboard</a>
    <a href="/admin/users">👥 Users</a>
    <a href="/admin/bookings">📅 Bookings</a>
    <a href="/admin/works">🧾 Works</a>
    <a href="/admin/profiles">👤 Profiles</a>
    <a href="/admin/analytics">📈 Analytics</a>
</div>

<!-- ================= MAIN ================= -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">

        <div>
            <h3 style="margin:0;">Welcome Admin</h3>
            <small>User ID: {{ user_id }}</small>
        </div>

        <div style="display:flex; gap:10px;">
            <input class="search-box" placeholder="Search...">
            <button class="btn primary" onclick="toggleDark()">🌙</button>
        </div>
    </div>

    <!-- CARDS -->
    <div class="cards">

        <div class="card">
            <h4>Total Users</h4>
            <h2>{{ total }}</h2>
        </div>

        <div class="card">
            <h4>Active</h4>
            <h2>{{ active }}</h2>
        </div>

        <div class="card">
            <h4>Blocked</h4>
            <h2>{{ blocked }}</h2>
        </div>

        <div class="card">
            <h4>Bookings</h4>
            <h2 id="bookingCount">--</h2>
        </div>

    </div>

    <!-- USERS TABLE -->
    <div class="table-box">
        <h3>Users</h3>

        <table>
            <thead>
                <tr>
                    <th>ID</th><th>Name</th><th>Status</th><th>Action</th>
                </tr>
            </thead>

            <tbody id="usersTable"></tbody>
        </table>
    </div>

</div>

<!-- ================= PROFILE MODAL ================= -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h3>User Profile</h3>
        <div id="profileData"></div>
        <button onclick="closeModal()" class="btn danger">Close</button>
    </div>
</div>

<!-- ================= SCRIPT ================= -->

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

/* ================= DARK MODE ================= */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* ================= SOCKET REALTIME ================= */
const socket = io();

socket.on("user_update", () => {
    loadUsers();
});

/* ================= LOAD USERS (PAGINATION READY) ================= */
async function loadUsers(page = 1) {
    const res = await fetch(`/admin/users?page=${page}`);
    const data = await res.json();

    const tbody = document.getElementById("usersTable");
    tbody.innerHTML = "";

    data.data.users.forEach(u => {
        tbody.innerHTML += `
        <tr>
            <td>${u.id}</td>
            <td>${u.name}</td>
            <td>${u.status}</td>
            <td>
                <button class="btn primary" onclick="viewUser(${u.id})">
                    View
                </button>
            </td>
        </tr>
        `;
    });

    renderPagination(data.data.pagination);
}

/* ================= PAGINATION ================= */
function renderPagination(p) {
    let html = `<div style="margin-top:10px;">`;

    for (let i = 1; i <= p.pages; i++) {
        html += `
        <button class="btn ${i === p.current ? 'primary' : ''}"
                onclick="loadUsers(${i})">
            ${i}
        </button>`;
    }

    html += `</div>`;

    document.getElementById("paginationBox")?.remove();

    const div = document.createElement("div");
    div.id = "paginationBox";
    div.innerHTML = html;

    document.querySelector(".table-box").appendChild(div);
}

/* ================= USER MODAL ================= */
function viewUser(id){
    document.getElementById("modal").style.display = "block";
    document.getElementById("profileData").innerHTML =
        "Loading User ID: " + id;
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

/* ================= INIT ================= */
loadUsers();

</script>

</body>
</html>
