<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { overflow-x: hidden; }
        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            position: fixed;
            width: 220px;
        }
        .sidebar a {
            color: white;
            display: block;
            padding: 12px;
            text-decoration: none;
        }
        .sidebar a:hover {
            background: #334155;
        }
        .content {
            margin-left: 220px;
            padding: 20px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="p-3">⚡ Admin</h4>
    <a href="#" onclick="loadUsers()">👤 Users</a>
    <a href="#" onclick="loadBookings()">📅 Bookings</a>
    <a href="#" onclick="loadWorks()">🛠 Work</a>
    <a href="#" onclick="loadAnalytics()">📊 Analytics</a>
</div>

<!-- MAIN -->
<div class="content">

    <h2 id="title">Dashboard</h2>

    <input type="text" id="search" class="form-control mb-3" placeholder="Search...">

    <div class="card shadow p-3">
        <div id="mainContent"></div>
    </div>

</div>

<script>

let currentPage = 1;

// ================= USERS =================
function loadUsers() {
    document.getElementById("title").innerText = "Users";

    fetch(`/admin/users?page=${currentPage}`)
    .then(res => res.json())
    .then(data => {

        let users = data.data.users;

        let html = `
        <table class="table">
        <thead>
            <tr>
                <th>ID</th><th>Name</th><th>Status</th><th>Action</th>
            </tr>
        </thead><tbody>
        `;

        users.forEach(u => {
            html += `
            <tr>
                <td>${u.id}</td>
                <td>${u.name}</td>
                <td>
                    <span class="badge bg-${u.status=='active'?'success':'danger'}">
                        ${u.status}
                    </span>
                </td>
                <td>
                    ${
                        u.status == "active"
                        ? `<button onclick="blockUser(${u.id})" class="btn btn-danger btn-sm">Block</button>`
                        : `<button onclick="unblockUser(${u.id})" class="btn btn-success btn-sm">Unblock</button>`
                    }
                </td>
            </tr>`;
        });

        html += "</tbody></table>";

        document.getElementById("mainContent").innerHTML = html;
    });
}

// ================= BOOKINGS =================
function loadBookings() {
    document.getElementById("title").innerText = "Bookings";

    fetch(`/admin/bookings`)
    .then(res => res.json())
    .then(data => {

        let bookings = data.data.bookings;

        let html = `
        <table class="table">
        <thead>
            <tr>
                <th>ID</th><th>User</th><th>Status</th><th>Action</th>
            </tr>
        </thead><tbody>
        `;

        bookings.forEach(b => {
            html += `
            <tr>
                <td>${b.id}</td>
                <td>${b.user}</td>
                <td>${b.status}</td>
                <td>
                    <button onclick="updateBooking(${b.id}, 'approved')" class="btn btn-success btn-sm">Approve</button>
                    <button onclick="updateBooking(${b.id}, 'rejected')" class="btn btn-danger btn-sm">Reject</button>
                </td>
            </tr>`;
        });

        html += "</tbody></table>";

        document.getElementById("mainContent").innerHTML = html;
    });
}

// ================= WORK =================
function loadWorks() {
    document.getElementById("title").innerText = "Works";

    fetch(`/admin/work`)
    .then(res => res.json())
    .then(data => {

        let works = data.data.works;

        let html = `
        <table class="table">
        <thead>
            <tr>
                <th>ID</th><th>Verified</th><th>Action</th>
            </tr>
        </thead><tbody>
        `;

        works.forEach(w => {
            html += `
            <tr>
                <td>${w.id}</td>
                <td>
                    <span class="badge bg-${w.verified?'success':'secondary'}">
                        ${w.verified}
                    </span>
                </td>
                <td>
                    <button onclick="updateWork(${w.id}, true)" class="btn btn-success btn-sm">Approve</button>
                    <button onclick="updateWork(${w.id}, false)" class="btn btn-danger btn-sm">Block</button>
                </td>
            </tr>`;
        });

        html += "</tbody></table>";

        document.getElementById("mainContent").innerHTML = html;
    });
}

// ================= ANALYTICS =================
function loadAnalytics() {
    document.getElementById("title").innerText = "Analytics";

    fetch('/admin/analytics')
    .then(res => res.json())
    .then(data => {

        let d = data.data;

        document.getElementById("mainContent").innerHTML = `
            <div class="row">
                <div class="col-md-4"><canvas id="userChart"></canvas></div>
                <div class="col-md-4"><canvas id="bookingChart"></canvas></div>
                <div class="col-md-4"><canvas id="workChart"></canvas></div>
            </div>
        `;

        new Chart(document.getElementById("userChart"), {
            type: 'doughnut',
            data: {
                labels: ['Active', 'Blocked'],
                datasets: [{ data: [d.users.active, d.users.blocked] }]
            }
        });

        new Chart(document.getElementById("bookingChart"), {
            type: 'bar',
            data: {
                labels: ['Approved', 'Rejected'],
                datasets: [{ data: [d.bookings.approved, d.bookings.rejected] }]
            }
        });

        new Chart(document.getElementById("workChart"), {
            type: 'pie',
            data: {
                labels: ['Verified', 'Pending'],
                datasets: [{ data: [d.work.verified, d.work.total - d.work.verified] }]
            }
        });
    });
}

// ================= ACTIONS =================
function blockUser(id) {
    fetch(`/admin/block/${id}`).then(()=>loadUsers());
}
function unblockUser(id) {
    fetch(`/admin/unblock/${id}`).then(()=>loadUsers());
}
function updateBooking(id, status) {
    fetch(`/admin/booking/update/${id}`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({status})
    }).then(()=>loadBookings());
}
function updateWork(id, verified) {
    fetch(`/admin/work/update/${id}`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({verified})
    }).then(()=>loadWorks());
}

// AUTO REFRESH ANALYTICS
setInterval(()=>{
    if(document.getElementById("title").innerText === "Analytics"){
        loadAnalytics();
    }
}, 5000);

// INIT
loadUsers();

</script>

</body>
</html>
