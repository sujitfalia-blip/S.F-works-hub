<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0f172a; color:#e2e8f0; }

.sidebar {
    width:240px;
    height:100vh;
    position:fixed;
    background:#020617;
}

.sidebar a {
    display:block;
    padding:12px;
    color:#cbd5f5;
    cursor:pointer;
}

.sidebar a:hover { background:#1e293b; }

.content {
    margin-left:240px;
    padding:20px;
}

.card {
    background:#1e293b;
    border-radius:12px;
}

.table { color:white; }

.topbar {
    background:#020617;
    padding:10px;
    display:flex;
    justify-content:space-between;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center mt-3">👑 Owner</h4>
    <a onclick="loadDashboard()">📊 Analytics</a>
    <a onclick="loadWorks()">🛠 Works</a>
    <a onclick="loadTransfer()">🔁 Transfer</a>
</div>

<!-- CONTENT -->
<div class="content">

<div class="topbar">
    <span>🚀 Owner Panel</span>
    <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
</div>

<h3 id="title" class="mt-3">Dashboard</h3>

<!-- FILTER -->
<select id="daysFilter" class="form-select mb-3" onchange="loadDashboard()">
    <option value="7">Last 7 Days</option>
    <option value="30" selected>Last 30 Days</option>
    <option value="90">Last 90 Days</option>
</select>

<input id="search" class="form-control mb-3" placeholder="Search...">

<div id="main"></div>

</div>

<script>

let workChart = null;
let userChart = null;

// ================= DASHBOARD =================
function loadDashboard() {

    document.getElementById("title").innerText = "Analytics Dashboard";

    let days = document.getElementById("daysFilter").value;

    document.getElementById("main").innerHTML = `
        <div class="row text-center">

            <div class="col-md-3">
                <div class="card p-3">
                    <h6>Total Works</h6>
                    <h2 id="totalWorks">...</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3">
                    <h6>Approved</h6>
                    <h2 id="approvedWorks">...</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3">
                    <h6>Pending</h6>
                    <h2 id="pendingWorks">...</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3">
                    <h6>Total Users</h6>
                    <h2 id="totalUsers">...</h2>
                </div>
            </div>

        </div>

        <div class="row mt-4">

            <div class="col-md-6">
                <div class="card p-3">
                    <h6>Work Growth</h6>
                    <canvas id="workChart"></canvas>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-3">
                    <h6>User Growth</h6>
                    <canvas id="userChart"></canvas>
                </div>
            </div>

        </div>
    `;

    fetch(`/owner/analytics?days=${days}`)
    .then(res => res.json())
    .then(res => {

        let d = res.data;

        // ✅ Cards
        document.getElementById("totalWorks").innerText = d.works.total;
        document.getElementById("approvedWorks").innerText = d.works.approved;
        document.getElementById("pendingWorks").innerText = d.works.pending;
        document.getElementById("totalUsers").innerText = d.users.total;

        // ❗ destroy old charts (IMPORTANT)
        if(workChart) workChart.destroy();
        if(userChart) userChart.destroy();

        // 📊 Work Chart
        workChart = new Chart(document.getElementById("workChart"), {
            type: 'line',
            data: {
                labels: d.growth.works.map(x => x.date),
                datasets: [{
                    label: "Works",
                    data: d.growth.works.map(x => x.count)
                }]
            }
        });

        // 📊 User Chart
        userChart = new Chart(document.getElementById("userChart"), {
            type: 'bar',
            data: {
                labels: d.growth.users.map(x => x.date),
                datasets: [{
                    label: "Users",
                    data: d.growth.users.map(x => x.count)
                }]
            }
        });

    });
}


// ================= WORK LIST =================
function loadWorks(){

    document.getElementById("title").innerText="Works";

    fetch('/owner/works')
    .then(res=>res.text())
    .then(html=>{
        document.getElementById("main").innerHTML = html;
    });
}


// ================= TRANSFER =================
function loadTransfer(){

    document.getElementById("title").innerText="Transfer";

    document.getElementById("main").innerHTML=`
    <div class="card p-3">

        <form method="POST" action="/owner/transfer">
            
            <input class="form-control mb-2" name="user_id" placeholder="User ID" required>
            <input class="form-control mb-2" name="new_controller" placeholder="Admin ID" required>

            <button class="btn btn-warning">Transfer</button>
        </form>

    </div>
    `;
}


// ================= SEARCH =================
document.getElementById("search").addEventListener("keyup", function(){
    let value = this.value.toLowerCase();
    document.querySelectorAll("table tr").forEach(row=>{
        row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
    });
});


// ================= LOGOUT =================
function logout(){
    window.location="/logout";
}


// INIT
loadDashboard();

</script>

</body>
</html>
