<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Owner Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#0f172a;
    color:#e2e8f0;
    font-family:Arial;
}

.sidebar{
    width:240px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    background:#020617;
    padding:20px;
}

.sidebar a{
    display:block;
    padding:12px;
    color:#cbd5e1;
    cursor:pointer;
    text-decoration:none;
}

.sidebar a:hover{
    background:#1e293b;
}

.content{
    margin-left:240px;
    padding:20px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#020617;
    border-radius:10px;
    margin-bottom:20px;
}

.card{
    background:#1e293b;
    border:none;
    color:white;
    border-radius:12px;
    padding:15px;
}

input, select{
    background:#1e293b !important;
    color:white !important;
    border:none !important;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>👑 OWNER</h4>
    <a onclick="loadDashboard()">📊 Analytics</a>
    <a onclick="loadWorks()">🛠 Works</a>
    <a onclick="loadTransfer()">🔁 Transfer</a>
</div>

<!-- CONTENT -->
<div class="content">

    <div class="topbar">
        <h5>🚀 Owner Panel</h5>
        <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
    </div>

    <h3 id="title">Dashboard</h3>

    <div id="main"></div>

</div>

<script>

let workChart = null;
let userChart = null;

// ================= DASHBOARD =================
function loadDashboard() {
    document.getElementById("title").innerText = "📊 Analytics Dashboard";

    const main = document.getElementById("main");

    main.innerHTML = `
        <div class="row g-3">

            <div class="col-md-3"><div class="card">Total Works <h3 id="totalWorks">0</h3></div></div>
            <div class="col-md-3"><div class="card">Approved <h3 id="approvedWorks">0</h3></div></div>
            <div class="col-md-3"><div class="card">Pending <h3 id="pendingWorks">0</h3></div></div>
            <div class="col-md-3"><div class="card">Users <h3 id="totalUsers">0</h3></div></div>

        </div>

        <div class="row mt-4">

            <div class="col-md-6"><canvas id="workChart"></canvas></div>
            <div class="col-md-6"><canvas id="userChart"></canvas></div>

        </div>
    `;

    const days = document.getElementById("daysFilter")?.value || 30;

    fetch(`/owner/analytics?days=${days}`)
    .then(res => res.json())
    .then(res => {

        const d = res.data;

        document.getElementById("totalWorks").innerText = d.works.total;
        document.getElementById("approvedWorks").innerText = d.works.approved;
        document.getElementById("pendingWorks").innerText = d.works.pending;
        document.getElementById("totalUsers").innerText = d.users.total;

        if (workChart) workChart.destroy();
        if (userChart) userChart.destroy();

        workChart = new Chart(document.getElementById("workChart"), {
            type: "line",
            data: {
                labels: d.growth.works.map(x => x.date),
                datasets: [{
                    label: "Works",
                    data: d.growth.works.map(x => x.count)
                }]
            }
        });

        userChart = new Chart(document.getElementById("userChart"), {
            type: "bar",
            data: {
                labels: d.growth.users.map(x => x.date),
                datasets: [{
                    label: "Users",
                    data: d.growth.users.map(x => x.count)
                }]
            }
        });

    })
    .catch(() => {
        main.innerHTML = `<div style="color:red">Failed to load analytics</div>`;
    });
}


// ================= WORKS =================
function loadWorks() {
    document.getElementById("title").innerText = "🛠 Works";

    document.getElementById("main").innerHTML =
        `<div class="card">Loading works...</div>`;

    fetch('/owner/works')
    .then(res => res.text())
    .then(html => {
        document.getElementById("main").innerHTML = html;
    })
    .catch(() => {
        document.getElementById("main").innerHTML =
            `<div style="color:red">Failed to load works</div>`;
    });
}


// ================= TRANSFER =================
function loadTransfer() {
    document.getElementById("title").innerText = "🔁 Transfer";

    document.getElementById("main").innerHTML = `
        <div class="card">
            <input id="userId" class="form-control mb-2" placeholder="User ID">
            <input id="newAdminId" class="form-control mb-2" placeholder="New Admin ID">
            <button class="btn btn-warning" onclick="transferUser()">Transfer</button>
        </div>
    `;
}

function transferUser() {
    fetch('/owner/transfer', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            userId: document.getElementById("userId").value,
            newAdminId: document.getElementById("newAdminId").value
        })
    })
    .then(res => res.json())
    .then(res => alert(res.message || "Done"))
    .catch(() => alert("Failed"));
}


// ================= SEARCH =================
document.addEventListener("keyup", function(e){
    if(e.target.id === "search"){
        let val = e.target.value.toLowerCase();

        document.querySelectorAll(".work-card").forEach(card => {
            card.style.display =
                card.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    }
});


// ================= LOGOUT =================
function logout(){
    window.location = "/logout";
}


// INIT
loadDashboard();

</script>

</body>
</html>
