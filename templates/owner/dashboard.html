<script>

let workChart = null;
let userChart = null;

// ================= DASHBOARD =================
function loadDashboard() {

    document.getElementById("title").innerText = "📊 Analytics Dashboard";

    const main = document.getElementById("main");

    main.innerHTML = `
        <div class="row g-3">

            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <h6>Total Works</h6>
                    <h3 id="totalWorks">0</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <h6>Approved</h6>
                    <h3 id="approvedWorks">0</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <h6>Pending</h6>
                    <h3 id="pendingWorks">0</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <h6>Users</h6>
                    <h3 id="totalUsers">0</h3>
                </div>
            </div>

        </div>

        <div class="row mt-4">

            <div class="col-md-6">
                <div class="card p-3">
                    <canvas id="workChart"></canvas>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-3">
                    <canvas id="userChart"></canvas>
                </div>
            </div>

        </div>
    `;

    fetch(`/owner/analytics?days=30`)
    .then(res => res.json())
    .then(res => {

        if (!res || !res.data) return;

        const d = res.data;

        document.getElementById("totalWorks").innerText = d.works.total;
        document.getElementById("approvedWorks").innerText = d.works.approved;
        document.getElementById("pendingWorks").innerText = d.works.pending;
        document.getElementById("totalUsers").innerText = d.users.total;

        // destroy old charts
        if (workChart) workChart.destroy();
        if (userChart) userChart.destroy();

        // WORK CHART
        const workCanvas = document.getElementById("workChart");

        if (workCanvas) {
            workChart = new Chart(workCanvas, {
                type: "line",
                data: {
                    labels: d.growth.works.map(x => x.date),
                    datasets: [{
                        label: "Works",
                        data: d.growth.works.map(x => x.count),
                        borderWidth: 2
                    }]
                }
            });
        }

        // USER CHART
        const userCanvas = document.getElementById("userChart");

        if (userCanvas) {
            userChart = new Chart(userCanvas, {
                type: "bar",
                data: {
                    labels: d.growth.users.map(x => x.date),
                    datasets: [{
                        label: "Users",
                        data: d.growth.users.map(x => x.count)
                    }]
                }
            });
        }

    })
    .catch(err => {
        main.innerHTML = `<div style="color:red">Analytics load failed</div>`;
        console.log(err);
    });
}


// ================= WORKS =================
function loadWorks() {

    document.getElementById("title").innerText = "🛠 Works";

    document.getElementById("main").innerHTML =
        `<div class="card p-3">Loading works...</div>`;

    fetch('/owner/works')
    .then(res => res.text())
    .then(html => {
        document.getElementById("main").innerHTML = html;
    });
}


// ================= TRANSFER =================
function loadTransfer() {

    document.getElementById("title").innerText = "🔁 Transfer";

    document.getElementById("main").innerHTML = `
        <div class="card p-3">

            <input id="userId" class="form-control mb-2" placeholder="User ID">
            <input id="newAdminId" class="form-control mb-2" placeholder="New Admin ID">

            <button class="btn btn-warning w-100" onclick="transferUser()">
                Transfer
            </button>

        </div>
    `;
}

function transferUser() {

    fetch('/owner/transfer', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            userId: document.getElementById("userId").value,
            newAdminId: document.getElementById("newAdminId").value
        })
    })
    .then(res => res.json())
    .then(res => alert(res.message || "Success"))
    .catch(() => alert("Failed"));
}


// ================= SEARCH =================
document.addEventListener("keyup", function(e){
    if(e.target.id === "search"){
        let val = e.target.value.toLowerCase();

        document.querySelectorAll(".work-card").forEach(card => {
            card.style.display =
                card.innerText.toLowerCase().includes(val)
                ? ""
                : "none";
        });
    }
});


// ================= LOGOUT =================
function logout(){
    window.location = "/logout";
}


// INIT
loadDashboard();

          </script>
