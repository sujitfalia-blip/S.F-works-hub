<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Analytics Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .work-card { transition: transform 0.2s; }
        .work-card:hover { transform: translateY(-5px); }
        #main { min-height: 400px; }
        .danger-zone {
            margin-top: 40px;
            padding: 20px;
            border: 2px solid red;
            border-radius: 10px;
            background: #fff;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1" id="title">Dashboard</span>
        <div class="d-flex">
            <input type="text" id="search" class="form-control me-2" placeholder="Search works...">
            <button class="btn btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container">

    <div class="mb-4">
        <button class="btn btn-primary me-2" onclick="loadDashboard()">📊 Dashboard</button>
        <button class="btn btn-secondary me-2" onclick="loadWorks()">🛠 Works</button>
        <button class="btn btn-warning" onclick="loadTransfer()">🔁 Transfer</button>
    </div>

    <div id="main"></div>

    <!-- ================= DANGER ZONE ================= -->
    <div class="danger-zone">
        <h3 style="color:red;">⚠️ Danger Zone (Owner Only)</h3>

        <form method="POST" action="/admin/db-reset"
              onsubmit="return confirm('⚠️ OWNER ONLY: This will DELETE EVERYTHING!')">

            <button style="
                background:red;
                color:white;
                padding:12px 18px;
                border:none;
                border-radius:8px;
                cursor:pointer;
            ">
                🧨 RESET FULL DATABASE
            </button>

        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    let workChart = null;
    let userChart = null;

    const API_BASE = "";

    async function fetchData(endpoint) {
        try {
            const response = await fetch(`${API_BASE}${endpoint}`);
            if (!response.ok) throw new Error();
            return await response.json();
        } catch (e) {
            return null;
        }
    }

    async function loadDashboard() {
        document.getElementById("title").innerText = "📊 Analytics Dashboard";

        const main = document.getElementById("main");
        main.innerHTML = `<div class="text-center mt-5">Loading...</div>`;

        const res = await fetchData('/owner/analytics?days=30');

        if (!res || !res.data) {
            main.innerHTML = `<div class="alert alert-danger">Failed to load analytics</div>`;
            return;
        }

        const d = res.data;

        main.innerHTML = `
            <div class="row g-3">
                <div class="col-md-3"><div class="card p-3 text-center"><h6>Total Works</h6><h3>${d.works.total}</h3></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><h6>Approved</h6><h3>${d.works.approved}</h3></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><h6>Pending</h6><h3>${d.works.pending}</h3></div></div>
                <div class="col-md-3"><div class="card p-3 text-center"><h6>Users</h6><h3>${d.users.total}</h3></div></div>
            </div>
        `;
    }

    async function loadWorks() {
        document.getElementById("title").innerText = "🛠 Works";
        document.getElementById("main").innerHTML = "Loading...";
    }

    function loadTransfer() {
        document.getElementById("title").innerText = "🔁 Transfer";

        document.getElementById("main").innerHTML = `
            <div class="card p-4" style="max-width:400px;margin:auto;">
                <input class="form-control mb-2" placeholder="User ID">
                <input class="form-control mb-2" placeholder="New Admin ID">
                <button class="btn btn-warning w-100">Transfer</button>
            </div>
        `;
    }

    document.getElementById("search").addEventListener("keyup", function(e){
        let val = e.target.value.toLowerCase();
        document.querySelectorAll(".work-card").forEach(c=>{
            c.style.display = c.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    });

    function logout(){
        window.location.href="/logout";
    }

    loadDashboard();
</script>

</body>
</html>
