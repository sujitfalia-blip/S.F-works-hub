<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Work</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .container {
            max-width: 550px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 5px;
            color: #222;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #777;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 5px rgba(74,144,226,0.3);
        }

        textarea {
            resize: none;
            height: 120px;
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.02);
        }

        .note {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-bottom: 10px;
        }

        .flash {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 13px;
        }

        .badge {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 15px;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>✏️ Edit Work</h2>
    <div class="subtitle">Update your work details carefully</div>
    <div class="badge">Admin Controlled Update Panel</div>

    <!-- FLASH MESSAGE -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <input type="text" name="title" value="{{ work.title }}" required placeholder="Work Title">

        <textarea name="description" required placeholder="Work Description">{{ work.description }}</textarea>

        <input type="text" name="mobile" value="{{ work.mobile }}" required placeholder="Mobile Number">

        <div class="note">
            ⚠️ Changes will be re-verified by owner after update
        </div>

        <button type="submit">Update Work</button>

    </form>

</div>

</body>
          </html>
