<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Work</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e9f0ff, #f7f9fc);
        }

        .container {
            max-width: 520px;
            margin: 50px auto;
            background: #fff;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 5px;
            color: #222;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #777;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 5px rgba(74,144,226,0.3);
        }

        textarea {
            resize: none;
            height: 110px;
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.02);
        }

        .note {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            text-align: center;
        }

        .flash {
            background: #ffe5e5;
            color: #c0392b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 13px;
        }

        .header-badge {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-bottom: 15px;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>🚀 Post New Work</h2>
    <div class="subtitle">Your work will be reviewed before publishing</div>
    <div class="header-badge">Verified Job Posting System</div>

    <!-- FLASH MESSAGE -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="/post_work">

        <input type="text" name="title" placeholder="e.g. 10 জন রাজমিস্ত্রি লাগবে" required>

        <textarea name="description" placeholder="Work details লিখুন..." required></textarea>

        <input type="text" name="mobile" placeholder="Mobile Number (Required)" required>

        <div class="note">
            ⚠️ Mobile number verification এর জন্য বাধ্যতামূলক
        </div>

        <button type="submit">Submit Work</button>

    </form>

</div>

</body>
</html>
