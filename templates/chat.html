<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* TOP BAR */
.topbar{
    height:60px;
    display:flex;
    align-items:center;
    padding:0 15px;
    background:#111827;
    font-weight:bold;
}

/* CHAT BOX */
.chat-container{
    height:calc(100vh - 130px);
    overflow-y:auto;
    padding:10px;
}

/* MESSAGE ROW */
.message-row{
    display:flex;
    margin:8px 0;
}

.me{
    justify-content:flex-end;
}

.other{
    justify-content:flex-start;
}

/* MESSAGE BUBBLE */
.message{
    max-width:70%;
    padding:10px 14px;
    border-radius:15px;
    font-size:14px;
    line-height:1.4;
    word-break:break-word;
}

/* ME */
.message.me{
    background:#2563eb;
    border-bottom-right-radius:5px;
}

/* OTHER */
.message.other{
    background:#1e293b;
    border-bottom-left-radius:5px;
}

/* INPUT */
.input-area{
    height:70px;
    display:flex;
    align-items:center;
    padding:10px;
    background:#111827;
    gap:10px;
}

.input-area input{
    flex:1;
    height:40px;
    border:none;
    border-radius:20px;
    padding:0 15px;
    outline:none;
    background:#1e293b;
    color:white;
}

.input-area button{
    width:45px;
    height:40px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

</style>

</head>

<body>

<!-- TOP -->
<div class="topbar">
    {{ receiver.name }}
</div>

<!-- CHAT -->
<div class="chat-container" id="chatBox">

    {% for msg in messages %}

        {% if msg.sender_id == current_user_id %}

        <div class="message-row me">
            <div class="message me">
                {{ msg.message }}
            </div>
        </div>

        {% else %}

        <div class="message-row other">
            <div class="message other">
                {{ msg.message }}
            </div>
        </div>

        {% endif %}

    {% endfor %}

</div>

<!-- INPUT -->
<div class="input-area">

    <input id="messageInput" placeholder="Type message...">

    <button onclick="sendMessage()">➤</button>

</div>

<!-- SOCKET -->
<script>

const socket = io();

const receiverId = Number("{{ receiver.id }}");
const currentUserId = Number("{{ current_user_id }}");

/* JOIN ROOM */
socket.on("connect", () => {
    socket.emit("join", {
        user_id: currentUserId
    });
});

/* SEND MESSAGE */
function sendMessage(){

    const input = document.getElementById("messageInput");
    const message = input.value.trim();

    if(!message) return;

    socket.emit("send_message", {
        receiver_id: receiverId,
        message: message
    });

    input.value = "";
}

/* RECEIVE MESSAGE (FIXED + CLEAN) */
socket.on("receive_message", (data) => {

    const box = document.getElementById("chatBox");

    const row = document.createElement("div");

    /* MY MESSAGE */
    if(Number(data.sender_id) === currentUserId){

        row.className = "message-row me";
        row.innerHTML = `
            <div class="message me">
                ${data.message}
            </div>
        `;

    }

    /* OTHER MESSAGE */
    else{

        row.className = "message-row other";
        row.innerHTML = `
            <div class="message other">
                ${data.message}
            </div>
        `;
    }

    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
});

</script>

</body>
</html>
