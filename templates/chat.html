<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Realtime Chat • S.F Works Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#0f172a;
    color:white;
}

/* ================= TOPBAR ================= */

.topbar{
    height:70px;
    background:#111827;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    position:sticky;
    top:0;
    z-index:1000;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.left{
    display:flex;
    align-items:center;
    gap:12px;
}

.back-btn{
    width:40px;
    height:40px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.user-info{
    display:flex;
    align-items:center;
    gap:10px;
}

.user-info img{
    width:45px;
    height:45px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #2563eb;
}

.user-text{
    display:flex;
    flex-direction:column;
}

.user-text h3{
    font-size:15px;
    font-weight:700;
}

.user-text small{
    color:#22c55e;
    font-size:12px;
}

/* ================= CHAT AREA ================= */

.chat-container{
    height:calc(100vh - 140px);
    overflow-y:auto;
    padding:15px;
}

.message-row{
    margin-bottom:14px;
    display:flex;
}

.message-row.me{
    justify-content:flex-end;
}

.message-row.other{
    justify-content:flex-start;
}

.message{
    max-width:75%;
    padding:12px 14px;
    border-radius:18px;
    position:relative;
    word-wrap:break-word;
    animation:fadeIn .2s ease;
}

.message.me{
    background:#2563eb;
    border-bottom-right-radius:5px;
}

.message.other{
    background:#1e293b;
    border-bottom-left-radius:5px;
}

.time{
    font-size:10px;
    opacity:0.7;
    margin-top:5px;
    text-align:right;
}

/* ================= TYPING ================= */

.typing-box{
    padding:0 15px;
    height:20px;
    color:#22c55e;
    font-size:13px;
}

/* ================= INPUT AREA ================= */

.input-area{
    height:70px;
    background:#111827;
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 12px;
    border-top:1px solid rgba(255,255,255,0.05);
}

.input-area input{
    flex:1;
    height:48px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#1e293b;
    color:white;
    padding:0 15px;
    font-size:14px;
}

.send-btn{
    width:52px;
    height:48px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* ================= SCROLL ================= */

.chat-container::-webkit-scrollbar{
    width:4px;
}

.chat-container::-webkit-scrollbar-thumb{
    background:#334155;
    border-radius:20px;
}

/* ================= ANIMATION ================= */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>

</head>

<body>

<!-- ================= TOPBAR ================= -->

<div class="topbar">

    <div class="left">

        <button class="back-btn"
                onclick="window.history.back()">
            ←
        </button>

        <div class="user-info">

            <img src="{{ receiver.profile_img if receiver.profile_img else '/static/default.png' }}">

            <div class="user-text">

                <h3>{{ receiver.name }}</h3>

                <small id="onlineStatus">
                    {% if receiver.is_online %}
                        Online
                    {% else %}
                        Offline
                    {% endif %}
                </small>

            </div>

        </div>

    </div>

</div>

<!-- ================= CHAT BOX ================= -->

<div class="chat-container" id="chatBox">

    {% for msg in messages %}

        {% if msg.sender_id == current_user.id %}

        <div class="message-row me">

            <div class="message me">

                {{ msg.message }}

                <div class="time">
                    You
                </div>

            </div>

        </div>

        {% else %}

        <div class="message-row other">

            <div class="message other">

                {{ msg.message }}

                <div class="time">
                    {{ receiver.name }}
                </div>

            </div>

        </div>

        {% endif %}

    {% endfor %}

</div>

<!-- ================= TYPING ================= -->

<div class="typing-box" id="typing"></div>

<!-- ================= INPUT ================= -->

<div class="input-area">

    <input
        type="text"
        id="messageInput"
        placeholder="Type your message..."
        oninput="typing()"
        onblur="stopTyping()"
    >

    <button
        class="send-btn"
        onclick="sendMessage()">
        ➤
    </button>

</div>

<!-- ================= SOCKET ================= -->

<script>

const socket = io();

const receiverId = "{{ receiver.id }}";
const currentUserId = "{{ current_user.id }}";


// ================= CONNECT =================

socket.on("connect", () => {

    console.log("✅ Socket Connected");

    socket.emit("join", {
        user_id: currentUserId
    });

});


// ================= SEND MESSAGE =================

function sendMessage(){

    let input = document.getElementById("messageInput");

    let message = input.value.trim();

    if(message === "") return;

    socket.emit("send_message", {

        receiver_id: receiverId,
        message: message

    });

    input.value = "";

    stopTyping();

}


// ================= ENTER KEY =================

document.getElementById("messageInput")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        sendMessage();

    }

});


// ================= RECEIVE MESSAGE =================

socket.on("receive_message", (data) => {

    const box = document.getElementById("chatBox");

    const row = document.createElement("div");

    if(data.sender_id == currentUserId){

        row.className = "message-row me";

        row.innerHTML = `

            <div class="message me">

                ${data.message}

                <div class="time">
                    You
                </div>

            </div>

        `;

    }else{

        row.className = "message-row other";

        row.innerHTML = `

            <div class="message other">

                ${data.message}

                <div class="time">
                    {{ receiver.name }}
                </div>

            </div>

        `;

    }

    box.appendChild(row);

    box.scrollTop = box.scrollHeight;

});


// ================= TYPING =================

function typing(){

    socket.emit("typing", {
        receiver_id: receiverId
    });

}


// ================= STOP TYPING =================

function stopTyping(){

    socket.emit("stop_typing", {
        receiver_id: receiverId
    });

}


// ================= SHOW TYPING =================

socket.on("typing", () => {

    document.getElementById("typing").innerHTML =
        "{{ receiver.name }} is typing...";

});

socket.on("stop_typing", () => {

    document.getElementById("typing").innerHTML = "";

});


// ================= AUTO SCROLL =================

window.onload = () => {

    const box = document.getElementById("chatBox");

    box.scrollTop = box.scrollHeight;

};

</script>

</body>
  </html>
