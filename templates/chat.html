<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Realtime Chat</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* TOP */
.topbar{
    height:70px;
    display:flex;
    align-items:center;
    padding:0 15px;
    background:#111827;
}

.chat-container{
    height:calc(100vh - 140px);
    overflow-y:auto;
    padding:10px;
}

.message-row{
    display:flex;
    margin:10px 0;
}

.me{ justify-content:flex-end; }
.other{ justify-content:flex-start; }

.message{
    max-width:70%;
    padding:10px 14px;
    border-radius:15px;
    font-size:14px;
}

.message.me{
    background:#2563eb;
    border-bottom-right-radius:5px;
}

.message.other{
    background:#1e293b;
    border-bottom-left-radius:5px;
}

.input-area{
    height:70px;
    display:flex;
    background:#111827;
    align-items:center;
    padding:0 10px;
}

.input-area input{
    flex:1;
    height:40px;
    border:none;
    border-radius:20px;
    padding:0 15px;
    outline:none;
}

.input-area button{
    width:50px;
    height:40px;
    margin-left:10px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

</style>

</head>

<body>

<!-- TOP -->
<div class="topbar">
    <b>{{ receiver.name }}</b>
</div>

<!-- CHAT -->
<div class="chat-container" id="chatBox">

    {% for msg in messages %}

        {% if msg.sender_id == current_user_id %}

        <div class="message-row me">
            <div class="message me">{{ msg.message }}</div>
        </div>

        {% else %}

        <div class="message-row other">
            <div class="message other">{{ msg.message }}</div>
        </div>

        {% endif %}

    {% endfor %}

</div>

<!-- INPUT -->
<div class="input-area">

    <input id="messageInput" placeholder="Type message...">

    <button onclick="sendMessage()">➤</button>

</div>

<!-- SOCKET -->
<script>

const socket = io();

const receiverId = Number("{{ receiver.id }}");
const currentUserId = Number("{{ current_user_id }}");

socket.on("connect", () => {
    socket.emit("join", { user_id: currentUserId });
});

/* SEND MESSAGE */
function sendMessage(){

    const input = document.getElementById("messageInput");
    const message = input.value.trim();

    if(!message) return;

    socket.emit("send_message", {
        receiver_id: receiverId,
        message: message
    });

    input.value = "";
}

/* RECEIVE MESSAGE */
socket.on("receive_message", (data) => {

    // only this chat
    if(
        data.sender_id != currentUserId &&
        data.sender_id != receiverId
    ){
        return;
    }

    const box = document.getElementById("chatBox");
    const div = document.createElement("div");

    if(data.sender_id == currentUserId){

        div.className = "message-row me";
        div.innerHTML = `<div class="message me">${data.message}</div>`;

    } else {

        div.className = "message-row other";
        div.innerHTML = `<div class="message other">${data.message}</div>`;
    }

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
});

</script>

</body>
</html>
